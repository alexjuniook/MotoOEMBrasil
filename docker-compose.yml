version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: motooem
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d motooem"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/motooem
    depends_on:
      - db
    ports:
      - "8080:8080"
  api-init:
    build: ./apps/api
    command: sh -c "npm ci --silent && npm run seed"
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/motooem
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
  admin:
    build: ./apps/admin
    ports:
      - "3001:3000"
  n8n:
    image: n8nio/n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
    ports:
      - "5678:5678"
volumes:
  db-data: {}
